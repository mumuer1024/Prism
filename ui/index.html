<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Prism</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: {
              DEFAULT: '#f8fafc',
              secondary: '#ffffff',
              tertiary: '#f1f5f9',
              dark: { DEFAULT: '#0a0a0f', secondary: '#141420', tertiary: '#1e1e2e' }
            },
            accent: { DEFAULT: '#7c5cfc', light: '#9b7dff', dark: '#6344d9' },
            success: '#00d4aa',
            error: '#ff6b6b',
            warn: '#ffaa44',
            border: { DEFAULT: 'var(--border)', light: '#cbd5e1', dark: 'var(--border)' },
            text: { DEFAULT: '#1e293b', secondary: '#64748b', muted: '#94a3b8', dark: { DEFAULT: '#f0f0f5', secondary: '#a0a0c0', muted: '#6a6a8a' }}
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['JetBrains Mono', 'SF Mono', 'monospace']
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-bg text-text h-screen flex flex-col overflow-hidden transition-colors duration-300">

  <!-- Header -->
  <header class="glass border-b border-border h-14 md:h-16 flex items-center justify-between px-3 md:px-6 flex-shrink-0 z-50">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 md:w-9 md:h-9 rounded-lg flex items-center justify-center text-lg shadow-lg" style="background: linear-gradient(135deg, #7c5cfc, #00d4aa);">🕵️</div>
      <span class="font-bold text-base md:text-lg tracking-wide hidden sm:block" style="color: var(--text);">Prism</span>
    </div>
    <nav class="hidden md:flex items-center gap-1">
      <button onclick="switchTab('console')" id="nav-console" class="nav-btn active px-4 py-2 rounded-lg text-sm font-medium transition-all" style="color: var(--text);">控制台</button>
      <button onclick="switchTab('reports')" id="nav-reports" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-all" style="color: var(--text);">报告</button>
      <button onclick="switchTab('sources')" id="nav-sources" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-all" style="color: var(--text);">信息源</button>
      <button onclick="switchTab('config')" id="nav-config" class="nav-btn px-4 py-2 rounded-lg text-sm font-medium transition-all" style="color: var(--text);">配置</button>
    </nav>
    <div class="flex items-center gap-2">
      <!-- Theme Toggle Button -->
      <button onclick="toggleTheme()" class="theme-toggle" id="theme-toggle" title="切换主题">
        <svg id="theme-icon-sun" class="hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
        <svg id="theme-icon-moon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
      </button>
      <button onclick="toggleMobileMenu()" class="md:hidden w-10 h-10 flex items-center justify-center rounded-lg hover:bg-bg-tertiary transition-colors">
        <svg id="menu-icon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>
    </div>
  </header>

  <!-- Mobile Menu -->
  <div id="mobile-menu" class="hidden md:hidden glass border-b border-border absolute top-14 left-0 right-0 z-40">
    <nav class="flex flex-col p-2 gap-1">
      <button onclick="switchTab('console'); toggleMobileMenu()" class="px-4 py-3 rounded-lg text-sm font-medium text-left flex items-center gap-3 transition-all" style="color: var(--text);"><span class="w-5 text-center">📊</span> 控制台</button>
      <button onclick="switchTab('reports'); toggleMobileMenu()" class="px-4 py-3 rounded-lg text-sm font-medium text-left flex items-center gap-3 transition-all" style="color: var(--text);"><span class="w-5 text-center">📄</span> 报告</button>
      <button onclick="switchTab('sources'); toggleMobileMenu()" class="px-4 py-3 rounded-lg text-sm font-medium text-left flex items-center gap-3 transition-all" style="color: var(--text);"><span class="w-5 text-center">📡</span> 信息源</button>
      <button onclick="switchTab('config'); toggleMobileMenu()" class="px-4 py-3 rounded-lg text-sm font-medium text-left flex items-center gap-3 transition-all" style="color: var(--text);"><span class="w-5 text-center">⚙️</span> 配置</button>
    </nav>
  </div>

  <!-- Main Content -->
  <main class="flex-1 overflow-hidden relative">

    <!-- Console Panel -->
    <div id="panel-console" class="panel h-full flex flex-col md:flex-row">
      <!-- Script List -->
      <div class="w-full md:w-72 lg:w-80 bg-bg-secondary border-r border-border flex flex-col flex-shrink-0">
        <div class="p-3 md:p-4 border-b border-border"><h2 class="text-sm font-semibold text-text-secondary uppercase tracking-wider">运行脚本</h2></div>
        <div class="flex-1 overflow-y-auto p-3 space-y-3">

          <!-- Mission Card -->
          <div id="card-mission" class="card-hover bg-bg-tertiary border border-border rounded-xl p-4 cursor-pointer relative overflow-hidden group">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-accent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl flex-shrink-0" style="background: rgba(124,92,252,0.1);">📊</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span id="dot-mission" class="w-2 h-2 rounded-full bg-text-muted"></span>
                  <span class="font-semibold text-sm truncate" style="color: var(--text);">情报日报</span>
                </div>
                <p class="text-xs text-text-secondary line-clamp-2">从 10+ 数据源抓取，生成 8 大板块中文日报</p>
                <button id="btn-mission" onclick="runScript('mission')" class="mt-3 w-full text-xs font-semibold py-2 rounded-lg transition-all flex items-center justify-center gap-2" style="background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.3); color: #7c5cfc;">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg> 运行
                </button>
              </div>
            </div>
          </div>

          <!-- Bounty Card -->
          <div id="card-bounty" class="card-hover bg-bg-tertiary border border-border rounded-xl p-4 cursor-pointer relative overflow-hidden group">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-accent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl flex-shrink-0" style="background: rgba(0,212,170,0.1);">💰</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span id="dot-bounty" class="w-2 h-2 rounded-full bg-text-muted"></span>
                  <span class="font-semibold text-sm truncate" style="color: var(--text);">赏金猎人</span>
                </div>
                <p class="text-xs text-text-secondary line-clamp-2">扫描 V2EX 急单与 Chrome 扩展商店机会</p>
                <button id="btn-bounty" onclick="runScript('bounty')" class="mt-3 w-full text-xs font-semibold py-2 rounded-lg transition-all flex items-center justify-center gap-2" style="background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.3); color: #7c5cfc;">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg> 运行
                </button>
              </div>
            </div>
          </div>

          <!-- Alpha Card -->
          <div id="card-alpha" class="card-hover bg-bg-tertiary border border-border rounded-xl p-4 cursor-pointer relative overflow-hidden group">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-accent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl flex-shrink-0" style="background: rgba(255,170,68,0.1);">⛏️</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span id="dot-alpha" class="w-2 h-2 rounded-full bg-text-muted"></span>
                  <span class="font-semibold text-sm truncate" style="color: var(--text);">Alpha 雷达</span>
                </div>
                <p class="text-xs text-text-secondary line-clamp-2">搜索 X/Twitter 上 Web3 开源工具与变现机会</p>
                <button id="btn-alpha" onclick="runScript('alpha')" class="mt-3 w-full text-xs font-semibold py-2 rounded-lg transition-all flex items-center justify-center gap-2" style="background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.3); color: #7c5cfc;">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg> 运行
                </button>
              </div>
            </div>
          </div>

          <!-- Revenue Card -->
          <div id="card-revenue" class="card-hover bg-bg-tertiary border border-border rounded-xl p-4 cursor-pointer relative overflow-hidden group">
            <div class="absolute left-0 top-0 bottom-0 w-1 bg-accent opacity-0 group-hover:opacity-100 transition-opacity"></div>
            <div class="flex items-start gap-3">
              <div class="w-10 h-10 rounded-lg flex items-center justify-center text-xl flex-shrink-0" style="background: rgba(255,107,107,0.1);">🏗️</div>
              <div class="flex-1 min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span id="dot-revenue" class="w-2 h-2 rounded-full bg-text-muted"></span>
                  <span class="font-semibold text-sm truncate" style="color: var(--text);">营收分析师</span>
                </div>
                <p class="text-xs text-text-secondary line-clamp-2">分析日报内容，输出 5 类商业机会</p>
                <button id="btn-revenue" onclick="runScript('revenue')" class="mt-3 w-full text-xs font-semibold py-2 rounded-lg transition-all flex items-center justify-center gap-2" style="background: rgba(124,92,252,0.1); border: 1px solid rgba(124,92,252,0.3); color: #7c5cfc;">
                  <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg> 运行
                </button>
              </div>
            </div>
          </div>

        </div>
      </div>

      <!-- Log Pane -->
      <div class="flex-1 flex flex-col min-h-0 bg-bg">
        <div class="h-12 md:h-14 border-b border-border flex items-center justify-between px-4 flex-shrink-0">
          <div class="flex items-center gap-3">
            <span class="font-mono text-xs text-text-secondary uppercase tracking-wider" id="log-title">等待运行</span>
            <span id="log-status" class="text-xs text-text-muted">—</span>
          </div>
          <button onclick="clearLog()" class="text-xs text-text-secondary hover:text-text px-3 py-1.5 rounded-lg hover:bg-bg-tertiary transition-colors">清空</button>
        </div>
        <div id="log-body" class="flex-1 overflow-y-auto p-4 font-mono text-xs space-y-1">
          <div class="flex flex-col items-center justify-center h-full text-text-muted gap-3">
            <div class="w-16 h-16 rounded-2xl bg-bg-tertiary flex items-center justify-center text-3xl">⚡</div>
            <p class="text-sm">选择左侧脚本，点击运行</p>
          </div>
        </div>
      </div>
    </div>


    <!-- Sources Panel -->
    <div id="panel-sources" class="panel hidden h-full flex flex-col">
      <div class="h-14 border-b border-border flex items-center px-4 md:px-6 flex-shrink-0">
        <div>
          <h2 class="font-semibold" style="color: var(--text);">信息源管理</h2>
          <p class="text-xs text-text-secondary">启用或禁用数据采集源</p>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-4 md:p-6">
        <div class="max-w-3xl mx-auto space-y-6">
          <!-- Sources will be loaded dynamically -->
          <div id="sources-list" class="space-y-3">
            <div class="flex items-center justify-center py-12 text-text-secondary">
              <svg class="w-5 h-5 animate-spin mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
              加载中...
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Reports Panel -->
    <div id="panel-reports" class="panel hidden h-full flex flex-col md:flex-row">
      <div class="w-full md:w-72 lg:w-80 bg-bg-secondary border-r border-border flex flex-col flex-shrink-0">
        <div class="p-3 md:p-4 border-b border-border"><h2 class="text-sm font-semibold text-text-secondary uppercase tracking-wider">报告列表</h2></div>
        <div id="report-list" class="flex-1 overflow-y-auto p-3 space-y-1">
          <div class="text-center py-8 text-text-muted text-sm">加载中...</div>
        </div>
      </div>
      <div class="flex-1 flex flex-col min-h-0 bg-bg">
        <div id="report-content" class="flex-1 overflow-y-auto p-4 md:p-8">
          <div class="flex flex-col items-center justify-center h-full text-text-muted gap-3">
            <div class="w-16 h-16 rounded-2xl bg-bg-tertiary flex items-center justify-center text-3xl">📄</div>
            <p class="text-sm">选择左侧报告查看</p>
          </div>
        </div>
      </div>
    </div>


    <!-- Config Panel -->
    <div id="panel-config" class="panel hidden h-full flex flex-col">
      <div class="h-14 border-b border-border flex items-center px-4 md:px-6 flex-shrink-0">
        <div>
          <h2 class="font-semibold" style="color: var(--text);">系统配置</h2>
          <p class="text-xs text-text-secondary" style="color: var(--text);">API 密钥、模型选择和其他设置</p>
        </div>
      </div>
      <div class="flex-1 overflow-y-auto p-4 md:p-6">
        <div id="config-content" class="max-w-3xl mx-auto space-y-6">
          <!-- 配置内容将由 config.js 动态加载 -->
          <div class="flex items-center justify-center py-12 text-text-secondary">
            <svg class="w-5 h-5 animate-spin mr-2" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            加载配置中...
          </div>
        </div>
      </div>
    </div>

  </main>

  <!-- Toast Notification -->
  <div id="toast" class="fixed bottom-4 left-1/2 -translate-x-1/2 bg-bg-secondary border border-border px-4 py-3 rounded-xl shadow-xl transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2 max-w-sm">
    <span id="toast-icon"></span>
    <span id="toast-message" class="text-sm font-medium"></span>
  </div>

  <!-- Scripts -->
  <script src="/static/core.js"></script>
  <script src="/static/navigation.js"></script>
  <script src="/static/console.js"></script>
  <script src="/static/reports.js"></script>
  <script src="/static/config.js"></script>
  <script src="/static/sources.js"></script>
  <script>
    // Initialize on load
    window.addEventListener('resize', () => {
      if (window.innerWidth >= 768) {
        document.getElementById('mobile-menu')?.classList.add('hidden');
      }
    });
    
    // Initialize theme
    document.addEventListener('DOMContentLoaded', async () => {
      initTheme();
    });
    
    switchTab('console');
  </script>
</body>
</html>
